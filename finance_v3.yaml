    line_spacing: 0.5em
    alignment: justified-with-no-hyphenation
    # date_and_location_column_alignment: right
    font_family:
      body: Helvetica
      name: Helvetica
      headline: Helvetica
      connections: Helvetica
      section_titles: Helvetica
    font_size:
      #     body: 10pt
      name: 25pt
    #     headline: 10pt
    #     connections: 10pt
